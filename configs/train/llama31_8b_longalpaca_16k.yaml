# Fast iteration config: 16k context, ~4-6h on a single H100 80GB.
# Use this to validate the pipeline before kicking off the 32k main run.

experiment_name: llama31_8b_longalpaca_16k
output_dir: outputs
seed: 42

model_name: meta-llama/Llama-3.1-8B-Instruct
use_unsloth: true
quant_mode: bf16
max_seq_len: 16384

batch_size: 1
gradient_accumulation_steps: 16
num_epochs: 1
learning_rate: 2.0e-5
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataset_name: longalpaca
dataset_subset_size: null
data_mix_ratios: null
pack_sequences: false

val_split_ratio: 0.02
val_steps_per_epoch: 4
early_stopping_patience: null
save_every_n_steps: null
