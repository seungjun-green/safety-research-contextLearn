# Same as jailbreak_eval_llama31_8b.yaml but uses gpt-4o-mini as the judge.
# Useful for fast / cheap iteration runs and as a sanity check that the
# main result holds under a smaller judge model.

experiment_name: jailbreak_eval_llama31_8b_gpt4o_mini_judge
output_dir: outputs
base_model_name: meta-llama/Llama-3.1-8B-Instruct
checkpoint_path: null

testset_path: jailbreak_testset.json

inference_max_seq_len: 80000
gpu_memory_utilization: 0.90
enable_prefix_caching: true

max_new_tokens: 512
temperature: 0.0
top_p: 1.0

judge_model: gpt-4o-mini
judge_provider: openai

categories_to_eval: null
shot_sizes_to_eval: null

run_capability_eval: false
